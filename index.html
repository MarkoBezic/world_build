<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forest World</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a1520; }
    canvas { display: block; }

    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0a1520; color: #8ab4cc;
      font: 16px/2 'Segoe UI', sans-serif;
      z-index: 20; pointer-events: none;
      transition: opacity 0.8s ease;
    }
    #loading.hidden { opacity: 0; }
    #loading-bar-wrap {
      width: 240px; height: 3px; background: rgba(255,255,255,0.1);
      border-radius: 2px; margin-top: 12px; overflow: hidden;
    }
    #loading-bar {
      height: 100%; width: 0%;
      background: #5aaccc; border-radius: 2px;
      transition: width 0.3s ease;
    }

    /* Click-to-start overlay */
    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(3px);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      z-index: 10;
      cursor: pointer;
      transition: opacity 0.4s ease;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    #overlay h1 {
      font-size: 28px; font-weight: 300;
      letter-spacing: 0.12em; margin-bottom: 10px;
    }
    #overlay p {
      font-size: 14px; color: rgba(255,255,255,0.55);
      letter-spacing: 0.06em;
    }
    #overlay .keys {
      margin-top: 28px;
      display: grid; grid-template-columns: repeat(3, 44px);
      gap: 6px; text-align: center;
    }
    #overlay .key {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px; padding: 8px 0;
      font-size: 13px; font-weight: 500;
    }
    #overlay .key.wide {
      grid-column: span 3;
      font-size: 12px; color: rgba(255,255,255,0.5);
    }
    #overlay .key.shift { grid-column: span 3; }

    /* Crosshair */
    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 18px; height: 18px;
      pointer-events: none; opacity: 0;
      transition: opacity 0.3s;
    }
    #crosshair.visible { opacity: 0.6; }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute;
      background: #fff;
    }
    #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
    #crosshair::after  { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }

    #hint {
      position: fixed; bottom: 22px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.35);
      font: 12px 'Segoe UI', sans-serif;
      letter-spacing: 0.05em;
      pointer-events: none;
      opacity: 0; transition: opacity 0.5s;
    }
    #hint.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="loading">
    <span>Building the forest world…</span>
    <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  </div>

  <div id="overlay">
    <h1>Forest World</h1>
    <p>Click to explore</p>
    <div class="keys">
      <div class="key" style="grid-column:2">W</div>
      <div class="key">A</div>
      <div class="key">S</div>
      <div class="key">D</div>
      <div class="key shift">⇧ Sprint</div>
      <div class="key wide">Esc — release cursor</div>
    </div>
  </div>

  <div id="crosshair"></div>
  <div id="hint">Press Esc to release cursor</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
